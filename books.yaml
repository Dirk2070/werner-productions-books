      marketing: >-
        **📌 In a Nutshell**


        **Some doors should never be opened.**


        **💡 What You'll Learn**


        - ✅ Until a fragment with no origin lands on her desk.


        - ✅ Beneath the faded script, a second layer shimmers through.


        - ✅ An atmospheric fantasy-psychothriller about hidden worlds, ancient powers - and the question of what we
        truly fear.


        **Some doors should never be opened.**


        Clara restores ancient manuscripts. Precise. Controlled. Alone. Until a fragment with no origin lands on her
        desk.


        Beneath the faded script, a second layer shimmers through. Letters she never learned - yet somehow can read.
        When she touches the parchment, she sees something. Someone.


        Then the message on her phone: Don't burn it. It deletes itself.


        What Clara doesn't know: She carries something within her. Something ancient. Something that wants to go home.
        And she's not the only one searching for it.


        **An atmospheric fantasy-psychothriller about hidden worlds, ancient powers - and the question of what we truly
        fear.**
