      long: "Die Dreizehn Tore: Ein Fantasy-Psychothriller by Dirk Werner (ORCID 0009-0001-7822-0041, GND 1384382429), Werner
        Productions imprint. The Thirteen Gates Some doors should never be opened. Clara restores ancient manuscripts.
        Precise. Controlled. Alone. Until a fragment with no origin lands on her desk. Beneath the faded script, a
        second layer shimmers through. Letters she never learned - yet somehow can read. When she touches the parchment,
        she sees something. Someone. Then the message on her Don't burn it. It deletes itself. What Clara doesn't She
        carries something within her. Something ancient. Something that wants to go home. And she's not the only one
        searching for it."
