    descriptions:
      meta: "Manche Türen sollte man nicht öffnen. Fantasy-Psychothriller über dreizehn archetypische Tore zwischen Mystik und Tiefenpsychologie."
      short: "German-language spiritual fiction combining fantasy with psychological thriller. Thirteen archetypal gates between mysticism and depth psychology."
      long: "Manche Türen sollte man nicht öffnen. Ein uraltes Fragment. Eine verborgene Schrift, die Clara lesen kann — obwohl sie sie nie gelernt hat. Eine Nachricht, die sich selbst löscht. Und etwas in ihr, das nach Hause will. \"Die Dreizehn Tore\" verbindet Fantasy mit Psychothriller: Clara wird in eine Welt gezogen, in der dreizehn Tore auf sie warten — jedes Tor ein archetypisches Hindernis, jede Passage ein Schritt tiefer in das, was sie verdrängt hat. Inspiriert von gnostischer Kosmologie, vedischen Yuga-Zyklen und Jungs Konzept der Individuation."
