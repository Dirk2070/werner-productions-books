        **📌 Kurz & Knapp**


        Manche Türen sollte man nicht öffnen. Ein uraltes Fragment. Eine verborgene Schrift, die Clara lesen kann –
        obwohl sie sie nie gelernt hat. Eine Nachricht, die sich selbst löscht. Und etwas in ihr, das nach Hause will.
        Ein atmosphärischer Fantasy-Psychothriller über verborgene Welten und uralte Mächte.


